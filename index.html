<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Attendance System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header Section -->
        <header class="header">
            <div class="header-left">
                <div class="logo-placeholder">
                    <img src="Email_logo-removebg-preview.png" alt="Company Logo">
                    <span>Guidance Labs</span>
                </div>
            </div>

            <div class="header-center">
                <h1 class="page-title">Attendance</h1>
                <div class="clock-display">
                    <span id="clock">09:40 AM</span>
                </div>
            </div>

            <div class="header-right">
                <div class="export-controls">
                    <select id="selectYear"></select>
                    <select id="selectMonth"></select>
                    <button class="btn btn-secondary" id="downloadAttendanceBtn">Download Attendance</button>
                </div>
                <button class="btn-add-employee" id="addEmployeeBtn">
                    <span class="plus-icon">+</span> Add Employee
                </button>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="main-content">
            <div id="employeesGrid" class="employees-grid">
                <!-- Employee cards will be dynamically inserted here -->
                <div class="loading-placeholder">
                    <div class="spinner"></div>
                    <p>Loading employees...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Employee Card Modal -->
    <div id="attendanceModal" class="modal hidden">
        <div class="modal-overlay" id="modalOverlay"></div>
        <div class="modal-content">
            <button class="modal-close" id="modalClose">&times;</button>
            <div class="modal-body">
                <h2 id="modalEmployeeName" class="modal-title">Employee Name</h2>
                <p id="modalEmployeeRole" class="modal-role">Job Title</p>

                <div class="modal-actions">
                    <button class="btn btn-in" id="btnClockIn">
                        <span class="action-icon">▼</span>
                        IN
                    </button>
                    <button class="btn btn-out" id="btnClockOut">
                        <span class="action-icon">▲</span>
                        OUT
                    </button>
                    <button class="btn btn-absent" id="btnAbsent">
                        <span class="action-icon">✕</span>
                        ABSENT
                    </button>
                </div>

                <!-- Time Picker (Manual Entry) -->
                <div id="timePickerSection" class="time-picker-section hidden">
                    <label for="timePicker">Select Time:</label>
                    <div class="time-picker-controls">
                        <select id="timePicker" class="time-select"></select>
                        <button class="btn btn-primary" id="btnTimeSubmit">Enter</button>
                    </div>
                </div>

                <!-- Edit Prompt (in-UI) -->
                <div id="editPrompt" class="edit-prompt hidden">
                    <p id="editPromptText">Already checked IN at 09:00. Edit?</p>
                    <div class="edit-prompt-actions">
                        <button class="btn btn-primary" id="btnEditYes">Yes</button>
                        <button class="btn btn-secondary" id="btnEditNo">No</button>
                    </div>
                </div>

                <!-- Confirmation Message -->
                <div id="confirmationMessage" class="confirmation-message hidden">
                    <div class="confirmation-icon">✓</div>
                    <p id="confirmationText">Checked in successfully</p>
                </div>

                <!-- Loading State -->
                <div id="loadingState" class="loading-state hidden">
                    <div class="spinner-small"></div>
                    <p>Processing...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Employee Modal -->
    <div id="addEmployeeModal" class="modal hidden">
        <div class="modal-overlay" id="addEmployeeOverlay"></div>
        <div class="modal-content">
            <button class="modal-close" id="addEmployeeClose">&times;</button>
            <div class="modal-body">
                <h2 class="modal-title">Add New Employee</h2>

                <form id="addEmployeeForm" class="form-group">
                    <div class="form-field">
                        <label for="employeeIdInput">Employee ID</label>
                        <input
                            type="text"
                            id="employeeIdInput"
                            placeholder="rushil"
                            required
                        >
                    </div>

                    <div class="form-field">
                        <label for="jobTitleInput">Job Title</label>
                        <input
                            type="text"
                            id="jobTitleInput"
                            placeholder="Manager"
                            required
                        >
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Add Employee</button>
                        <button type="button" class="btn btn-secondary" id="cancelAddEmployee">Cancel</button>
                    </div>
                </form>

                <div id="addEmployeeMessage" class="confirmation-message hidden">
                    <div class="confirmation-icon">✓</div>
                    <p id="addEmployeeMessageText">Employee added successfully</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirmation Toast -->
    <div id="toastNotification" class="toast-notification hidden">
        <p id="toastMessage"></p>
    </div>

    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
